name: Sync Upstream and Build

on:
  schedule:
    # 01:00 UTC = 03:00 CEST / 02:00 CET. GitHub may delay scheduled runs by up to ~1h.
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force rebuild and re-release the latest tag, even if all zips are already present'
        type: boolean
        default: false
  push:
    paths:
      - '.github/workflows/sync-and-build.yml'

permissions:
  contents: write

jobs:

  sync:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.gate.outputs.should_build }}
      version: ${{ steps.gate.outputs.version }}
      tag: ${{ steps.gate.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Same call the "Sync fork" button makes. Surfaces conflicts loudly.
      - name: Sync master with upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          gh api -X POST "repos/${{ github.repository }}/merge-upstream" \
            -f branch=master

      - name: Mirror upstream tags
        run: |
          set -e
          git remote add upstream https://github.com/bogdanfinn/tls-client.git || true
          git fetch upstream --tags
          # Push any new annotated tags from upstream onto origin.
          git push origin --tags

      - name: Decide whether to build
        id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          LATEST=$(git tag --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            echo "No tags found; nothing to build."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ inputs.force }}" = "true" ]; then
            echo "Forced rebuild requested for $LATEST."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "version=${LATEST#v}" >> "$GITHUB_OUTPUT"
            echo "tag=$LATEST" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          EXPECTED="android-arm64-v8a.zip android-armeabi-v7a.zip android-x86.zip android-x86_64.zip linux-aarch64.zip linux-arm.zip linux-x86_64.zip macos-arm64.zip macos-x86_64.zip windows-arm64.zip windows-x86_64.zip freebsd-x86_64.zip"

          PRESENT=$(gh release view "$LATEST" --json assets --jq '[.assets[].name] | join(" ")' 2>/dev/null || echo "__no_release__")

          if [ "$PRESENT" = "__no_release__" ]; then
            echo "No release exists for $LATEST yet — building."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "version=${LATEST#v}" >> "$GITHUB_OUTPUT"
            echo "tag=$LATEST" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          MISSING=""
          for z in $EXPECTED; do
            case " $PRESENT " in
              *" $z "*) ;;
              *) MISSING="$MISSING $z" ;;
            esac
          done

          if [ -z "$MISSING" ]; then
            echo "All expected zips present for $LATEST. Skipping build."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "Build needed for $LATEST. Missing:$MISSING"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "version=${LATEST#v}" >> "$GITHUB_OUTPUT"
            echo "tag=$LATEST" >> "$GITHUB_OUTPUT"
          fi

  build-linux-amd64:
    needs: sync
    if: needs.sync.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.23' }
      - name: Build
        working-directory: cffi_dist
        run: |
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 \
            go build -buildmode=c-shared -o ../out/linux-x86_64/libtls_client_go.so .
      - uses: actions/upload-artifact@v4
        with: { name: linux-x86_64, path: out/ }

  build-linux-arm64:
    needs: sync
    if: needs.sync.outputs.should_build == 'true'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.23' }
      - name: Build
        working-directory: cffi_dist
        run: |
          CGO_ENABLED=1 GOOS=linux GOARCH=arm64 \
            go build -buildmode=c-shared -o ../out/linux-aarch64/libtls_client_go.so .
      - uses: actions/upload-artifact@v4
        with: { name: linux-aarch64, path: out/ }

  build-windows:
    needs: sync
    if: needs.sync.outputs.should_build == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.23' }
      - name: Build
        working-directory: cffi_dist
        run: |
          $env:CGO_ENABLED="1"
          go build -buildmode=c-shared -o ../out/windows-x86_64/tls_client_go.dll .
      - uses: actions/upload-artifact@v4
        with: { name: windows-x86_64, path: out/ }

  build-macos:
    needs: sync
    if: needs.sync.outputs.should_build == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.23' }
      - name: Build
        working-directory: cffi_dist
        run: |
          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 \
            go build -buildmode=c-shared -o ../out/macos-arm64/libtls_client_go.dylib .
          CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 \
            go build -buildmode=c-shared -o ../out/macos-x86_64/libtls_client_go.dylib .
      - uses: actions/upload-artifact@v4
        with: { name: macos, path: out/ }

  build-android:
    needs: sync
    if: needs.sync.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.23' }
      - name: Build
        working-directory: cffi_dist
        run: |
          NDK_BIN=$(find "$ANDROID_HOME/ndk" -name "aarch64-linux-android21-clang" | head -1 | xargs dirname)
          CC="$NDK_BIN/aarch64-linux-android21-clang" \
            CGO_ENABLED=1 GOOS=android GOARCH=arm64 \
            go build -buildmode=c-shared -o ../out/android-arm64-v8a/libtls_client_go.so .
          CC="$NDK_BIN/armv7a-linux-androideabi21-clang" \
            CGO_ENABLED=1 GOOS=android GOARCH=arm \
            go build -buildmode=c-shared -o ../out/android-armeabi-v7a/libtls_client_go.so .
          CC="$NDK_BIN/i686-linux-android21-clang" \
            CGO_ENABLED=1 GOOS=android GOARCH=386 \
            go build -buildmode=c-shared -o ../out/android-x86/libtls_client_go.so .
          CC="$NDK_BIN/x86_64-linux-android21-clang" \
            CGO_ENABLED=1 GOOS=android GOARCH=amd64 \
            go build -buildmode=c-shared -o ../out/android-x86_64/libtls_client_go.so .
      - uses: actions/upload-artifact@v4
        with: { name: android, path: out/ }

  build-linux-arm:
    needs: sync
    if: needs.sync.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.23' }
      - name: Install ARM cross-toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf
      - name: Build
        working-directory: cffi_dist
        run: |
          CC=arm-linux-gnueabihf-gcc \
            CGO_ENABLED=1 GOOS=linux GOARCH=arm GOARM=7 \
            go build -buildmode=c-shared -o ../out/linux-arm/libtls_client_go.so .
      - uses: actions/upload-artifact@v4
        with: { name: linux-arm, path: out/ }

  build-windows-arm64:
    needs: sync
    if: needs.sync.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.23' }
      - name: Install llvm-mingw
        run: |
          set -e
          MINGW_TAG="20240619"
          MINGW_DIR="llvm-mingw-${MINGW_TAG}-msvcrt-ubuntu-20.04-x86_64"
          curl -L -o llvm-mingw.tar.xz \
            "https://github.com/mstorsjo/llvm-mingw/releases/download/${MINGW_TAG}/${MINGW_DIR}.tar.xz"
          tar -xf llvm-mingw.tar.xz
          echo "$PWD/${MINGW_DIR}/bin" >> "$GITHUB_PATH"
      - name: Build
        working-directory: cffi_dist
        run: |
          CC=aarch64-w64-mingw32-clang \
            CGO_ENABLED=1 GOOS=windows GOARCH=arm64 \
            go build -buildmode=c-shared -o ../out/windows-arm64/tls_client_go.dll .
      - uses: actions/upload-artifact@v4
        with: { name: windows-arm64, path: out/ }

  build-freebsd-amd64:
    needs: sync
    if: needs.sync.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build inside FreeBSD VM
        uses: cross-platform-actions/action@v0.27.0
        with:
          operating_system: freebsd
          architecture: x86-64
          version: '14.2'
          shell: bash
          run: |
            sudo pkg install -y go
            cd cffi_dist
            CGO_ENABLED=1 go build -buildmode=c-shared -o ../out/freebsd-x86_64/libtls_client_go.so .
      - uses: actions/upload-artifact@v4
        with: { name: freebsd-x86_64, path: out/ }

  release:
    needs:
      - sync
      - build-linux-amd64
      - build-linux-arm64
      - build-linux-arm
      - build-windows
      - build-windows-arm64
      - build-macos
      - build-android
      - build-freebsd-amd64
    if: needs.sync.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with: { path: out/, merge-multiple: true }

      - name: Package and publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="${{ needs.sync.outputs.tag }}"

          cd out
          for dir in */; do
            platform="${dir%/}"
            zip -j "../$platform.zip" "$dir"/*
          done
          cd ..

          # Recreate the release so reruns produce a clean asset set.
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" \
            *.zip \
            --title "tls-client $TAG" \
            --notes "Auto-built from upstream bogdanfinn/tls-client $TAG"
